name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Check out source
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12.10'
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements-dev.lock

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: '22.17.0'

      - name: Install pinned dependencies
        run: |
          python -m pip install --requirement requirements-dev.lock
          python -m pip check

      - name: Run Python tests
        run: python -I -B .\run_tests.py

      - name: Check JavaScript syntax
        run: node --check web/app.js

      - name: Check PowerShell syntax
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $files = @(
            'launch-moku.ps1',
            'build-portable.ps1',
            'make-release.ps1',
            'tests/packaged_exe_end_to_end_probe.ps1',
            'tests/live_native_folder_picker_probe.ps1',
            'tests/live_native_folder_select_probe.ps1'
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [void][Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path -LiteralPath $file), [ref]$tokens, [ref]$errors
            )
            if (@($errors).Count) {
              throw "$file has PowerShell syntax errors: $($errors.Message -join '; ')"
            }
          }

      - name: Build and verify portable Windows package
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File .\build-portable.ps1

      - name: Re-verify schema 3 distribution manifest
        shell: powershell
        run: |
          python -I -B .\build_manifest.py verify .\dist\MOKU\BUILD_MANIFEST.json .\dist\MOKU\MOKU.exe
          $manifest = Get-Content -LiteralPath .\dist\MOKU\BUILD_MANIFEST.json -Raw -Encoding UTF8 | ConvertFrom-Json
          if ([int]$manifest.schemaVersion -ne 3) { throw 'Unexpected build manifest schema' }

      - name: Upload verified portable package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: MOKU-windows-x64-${{ github.sha }}
          path: dist/MOKU
          if-no-files-found: error
          retention-days: 7
